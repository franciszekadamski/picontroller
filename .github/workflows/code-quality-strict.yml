name: Code Quality Checks (Strict)

on:
  workflow_dispatch:  # Manual trigger
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  code-quality-strict:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.10']
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint mypy flake8
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Run Pylint (STRICT)
      run: |
        pylint hub/ pico/ --fail-under=8.0
    
    - name: Run MyPy (STRICT)
      run: |
        mypy hub/ pico/ --ignore-missing-imports
    
    - name: Run Flake8 (STRICT)
      run: |
        flake8 hub/ pico/ --max-line-length=120 --extend-ignore=E203,W503
