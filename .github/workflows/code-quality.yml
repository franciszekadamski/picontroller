name: Code Quality Checks

on:
  push:
    branches: [ main, 6-refactor-code-for-attrs-and-linters ]
  pull_request:
    branches: [ main, 6-refactor-code-for-attrs-and-linters ]

jobs:
  code-quality:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.10']
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint mypy flake8
        # Install any project requirements if they exist
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Run Pylint on hub/
      continue-on-error: true
      run: |
        pylint hub/ --fail-under=8.0 --exit-zero
    
    - name: Run Pylint on pico/
      continue-on-error: true
      run: |
        pylint pico/ --fail-under=8.0 --exit-zero
    
    - name: Run MyPy on hub/
      continue-on-error: true
      run: |
        mypy hub/ --ignore-missing-imports
    
    - name: Run MyPy on pico/
      continue-on-error: true
      run: |
        mypy pico/ --ignore-missing-imports
    
    - name: Run Flake8 on hub/
      continue-on-error: true
      run: |
        flake8 hub/ --max-line-length=120 --extend-ignore=E203,W503
    
    - name: Run Flake8 on pico/
      continue-on-error: true
      run: |
        flake8 pico/ --max-line-length=120 --extend-ignore=E203,W503
