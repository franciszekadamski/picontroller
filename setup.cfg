[tool:pytest]
testpaths = tests

[pylint]
max-line-length = 120
disable = C0111,C0103,R0903,W0212

[mypy]
python_version = 3.10
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
ignore_missing_imports = True

[flake8]
max-line-length = 120
extend-ignore = E203, W503
exclude = .git,__pycache__,.venv,venv
